name: 股票监控

on:
  schedule:
    - cron: '0 */2 * * *'        # 每 2 小时重启（保活）
  workflow_dispatch:              # 手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 120          # 2 小时
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install httpx pyyaml deep-translator

      - name: 恢复通知记录
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: seen_tweets.json
          key: monitor-state-v3

      - name: 运行监控 (5min/次 × 110min)
        run: python github_main.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TARGET_USER: ${{ vars.TARGET_USER || 'aleabitoreddit' }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}

      - name: 保存通知记录
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_tweets.json
          key: monitor-state-v3
