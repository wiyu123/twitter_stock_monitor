name: 股票监控

on:
  schedule:
    # GitHub Actions cron 对 <1h 间隔可能延迟，多条偏移 cron 增加频率
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

# 防止同时跑两个实例
concurrency: monitor-singleton

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 3

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install httpx pyyaml

      - name: 恢复通知记录
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: |
            seen_tweets.json
          key: monitor-state-v3

      - name: 运行监控
        run: python github_main.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TARGET_USER: ${{ vars.TARGET_USER || 'aleabitoreddit' }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}

      - name: 保存通知记录
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            seen_tweets.json
          key: monitor-state-v3
